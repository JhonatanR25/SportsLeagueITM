<div class="shell">
  <aside class="sidebar">
    <div class="sidebar__intro">
      <div class="brand">
        <p class="brand__eyebrow">Centro de control de liga</p>
        <h1>Sports League ITM</h1>
        <p class="brand__copy">
          Plataforma central para gestionar competencia, talento, calendario, sponsors y torneos
          con criterio ejecutivo.
        </p>
      </div>
    </div>

    <nav class="nav" aria-label="Principal">
      @for (item of navigation; track item.route) {
        <a
          class="nav__item"
          [routerLink]="item.route"
          routerLinkActive="nav__item--active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        >
          <span class="nav__content">
            <span class="nav__label">{{ item.label }}</span>
            <span class="nav__description">{{ item.description }}</span>
          </span>
        </a>
      }
    </nav>
  </aside>

  <div class="content">
    <main class="page">
      <router-outlet />
    </main>
  </div>
</div>
