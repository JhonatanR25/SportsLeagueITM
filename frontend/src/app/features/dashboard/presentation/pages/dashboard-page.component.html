@if (isLoading()) {
  <app-state-card
    label="Actualizando panel"
    title="Consultando la informacion general de la competencia..."
  />
} @else if (errorMessage()) {
  <app-state-card
    label="Resumen no disponible"
    [title]="errorMessage()"
    tone="error"
    actionLabel="Reintentar"
    (action)="retry()"
  />
} @else {
  <section class="panel">
    <div class="panel__header">
      <h2>Resumen operativo</h2>

      <div class="panel__season">
        <span>Temporada actual</span>
        <strong>2026</strong>
      </div>
    </div>

    <div class="module-grid">
      @for (module of modules(); track module.title) {
        <article class="module-card" [class]="'module-card module-card--' + module.accent">
          <div class="module-card__header">
            <h3>{{ module.title }}</h3>
            <a class="module-card__cta" [routerLink]="module.route">{{ module.cta }}</a>
          </div>

          <div class="module-card__metrics">
            @for (stat of module.stats; track stat.label) {
              <div>
                <span>{{ stat.label }}</span>
                <strong>{{ stat.value }}</strong>
              </div>
            }
          </div>
        </article>
      }
    </div>
  </section>
}
