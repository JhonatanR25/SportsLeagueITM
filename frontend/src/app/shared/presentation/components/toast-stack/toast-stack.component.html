<section class="toast-stack" aria-live="polite" aria-label="Notificaciones">
  @for (notification of notifications; track notification.id) {
    <article class="toast" [class.toast--error]="notification.type === 'error'">
      <div>
        <strong>{{ notification.title }}</strong>
        <p>{{ notification.message }}</p>
      </div>
      <button
        type="button"
        class="icon-button icon-button--toast icon-button--icon-only icon-button--close"
        (click)="dismissNotification(notification.id)"
        aria-label="Cerrar notificacion"
      >
        <span class="sr-only">Cerrar</span>
      </button>
    </article>
  }
</section>
